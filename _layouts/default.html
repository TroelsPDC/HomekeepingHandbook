<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  {% include google-fonts.html %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  </header>
  <main class="content">
    {{ content }}
  </main>
  <footer class="site-footer">
    {% if page.url == '/toc/' %}
      <p><a href="{{ '/' | relative_url }}">← Go to cover</a></p>
    {% else %}
      <p><a href="{{ '/toc/' | relative_url }}">← Table of Contents</a></p>
    {% endif %}
    <p class="colophon">A Collaborative Household Reference</p>
  </footer>
  <script src="{{ '/assets/js/audio.js' | relative_url }}"></script>
  {% if page.url == '/toc/' %}
  <div class="visitor-counter" aria-label="Visitor count">
    <span class="visitor-counter-label">Visitors</span>
    <img
      src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Ftroelspdc.github.io%2FHomekeepingHandbook%2Ftoc%2F&count_bg=%235c3d1a&title_bg=%233e2f1c&icon=scroll&icon_color=%23fdf6e3&title=visits&edge_flat=false"
      alt="Visitor count badge"
      class="visitor-counter-badge"
      loading="lazy"
    />
  </div>
  {% endif %}
</body>
</html>

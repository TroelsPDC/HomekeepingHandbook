<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  {% include google-fonts.html %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cover-link {
      display: block;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
    }

    .cover-link img {
      max-width: min(90vw, 540px);
      max-height: 80vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      border: 2px solid #5c3d1a;
    }

    .cover-hint {
      margin-top: 1.2rem;
      font-family: 'Folkard', 'Georgia', serif;
      font-size: 0.95rem;
      color: #c9b99a;
      letter-spacing: 0.08em;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <a href="{{ '/toc/' | relative_url }}" class="cover-link" title="Enter the Handbook">
    <img src="{{ '/BookCover.png' | relative_url }}" alt="The Essential Guide to Caring for Everything in Your Domain — book cover">
    <p class="cover-hint">Click to enter</p>
  </a>
</body>
</html>
